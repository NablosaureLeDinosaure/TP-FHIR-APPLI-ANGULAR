server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy optionnel vers le serveur FHIR si le back tourne dans un autre conteneur.
  # À adapter selon le nom du service Docker du back.
  location /fhir/ {
    proxy_pass http://host.docker.internal:8080/fhir/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
